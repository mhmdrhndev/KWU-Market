<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Produk — KWU Market</title>
  <meta name="description"
    content="Katalog produk mahasiswa wirausaha KWU Market. Kuliner, fashion, kerajinan, dan jasa digital langsung dari kampus." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="index.css" />
  <link rel="stylesheet" href="products.css" />
  <link rel="icon" type="image/svg+xml"
    href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%231a56db'/%3E%3Ctext x='50%25' y='54%25' dominant-baseline='middle' text-anchor='middle' fill='%23fff' font-family='sans-serif' font-size='18' font-weight='bold'%3EK%3C/text%3E%3C/svg%3E" />
</head>

<body>
  <!-- Navbar -->
  <nav class="nav">
    <div class="nav__inner">
      <a href="index.html" class="nav__logo">KWU <span>Market</span></a>

      <div class="nav__search">
        <span class="nav__search-icon">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
            stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8" />
            <line x1="21" y1="21" x2="16.65" y2="16.65" />
          </svg>
        </span>
        <input type="text" class="nav__search-input" id="searchInput" placeholder="Cari produk..." autocomplete="off" />
      </div>

      <div class="nav__links">
        <a href="index.html" class="nav__link">Home</a>
        <a href="products.html" class="nav__link nav__link--active">Products</a>
        <a href="index.html#about" class="nav__link">About</a>
      </div>



      <button class="nav__mobile-toggle" id="navToggle" aria-label="Menu">
        <span></span>
        <span></span>
        <span></span>
      </button>
    </div>
  </nav>

  <!-- Products Section -->
  <section class="products-section">
    <div class="products-section__inner">
      <div class="products-section__header">
        <h1 class="products-section__title">Produk Mahasiswa</h1>
        <p class="products-section__desc">
          Setiap produk dibuat dan dijual langsung oleh mahasiswa dari Divisi Kewirausahaan.
        </p>
      </div>

      <!-- Filter Tabs -->
      <div class="filter-bar" id="filterTabs">
        <button class="filter-btn filter-btn--active" data-category="all">Semua</button>
        <button class="filter-btn" data-category="food">Kuliner</button>
        <button class="filter-btn" data-category="fashion">Fashion</button>
        <button class="filter-btn" data-category="craft">Kerajinan</button>
        <button class="filter-btn" data-category="digital">Jasa Digital</button>
      </div>

      <!-- Products Grid -->
      <div class="products-grid" id="productsGrid">
        <!-- Populated by JS -->
      </div>
    </div>
  </section>

  <!-- Footer -->
  <footer class="footer">
    <div class="footer__inner">
      <div class="footer__top">
        <div>
          <div class="footer__brand">KWU <span>Market</span></div>
          <p class="footer__tagline">&copy; 2024 KWU Market. Empowering student entrepreneurs.</p>
        </div>
        <div class="footer__links">
          <a href="#" class="footer__link">Privacy Policy</a>
          <a href="#" class="footer__link">Terms of Service</a>
          <a href="#" class="footer__link">Contact Support</a>
          <a href="#" class="footer__link">Instagram</a>
          <a href="#" class="footer__link">LinkedIn</a>
        </div>
      </div>
    </div>
  </footer>

  <script src="main.js"></script>
  <script src="products.js"></script>
</body>

</html>
